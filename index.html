<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloom</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      color: #fff;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    /* ── UI overlay ──────────────────────────────────────────────── */
    #ui {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      pointer-events: none;
      transition: opacity 2.5s ease;
    }

    #ui.faded {
      opacity: 0;
      pointer-events: none;
    }

    #ui.faded:hover {
      opacity: 1;
      pointer-events: all;
    }

    #ui h1 {
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      opacity: 0.5;
      margin-bottom: 8px;
    }

    .connect-row {
      display: flex;
      gap: 12px;
      pointer-events: all;
    }

    button {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.75);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      padding: 9px 20px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, opacity 0.2s;
    }

    button:hover:not(:disabled) {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.3);
    }

    button:disabled {
      opacity: 0.4;
      cursor: default;
    }

    /* ── Status line ─────────────────────────────────────────────── */
    .status-row {
      display: flex;
      gap: 16px;
      pointer-events: none;
    }

    .status {
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      opacity: 0.3;
      transition: opacity 0.4s;
    }

    .status.active { color: #7dffb3; opacity: 0.7; }
    .status.error  { color: #ff7d7d; opacity: 0.8; }

    /* ── Tune panel ─────────────────────────────────────────────── */
    #tune {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: rgba(8,8,12,0.82);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      backdrop-filter: blur(14px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: all;
      min-width: 210px;
    }

    #tune.hidden { opacity: 0; pointer-events: none; transform: translateY(6px); }

    /* ── Band mute / solo controls ──────────────────────────────── */
    .band-row {
      display: flex;
      align-items: center;
      gap: 8px;
      transition: opacity 0.2s;
    }
    .band-row.muted   { opacity: 0.35; }
    .band-row.dimmed  { opacity: 0.25; }

    .band-name {
      font-size: 0.63rem;
      letter-spacing: 0.09em;
      opacity: 0.55;
      text-transform: uppercase;
      width: 46px;
      flex-shrink: 0;
    }

    /* pill toggle */
    .tog-wrap {
      position: relative;
      display: inline-block;
      width: 30px;
      height: 17px;
      flex-shrink: 0;
    }
    .tog-wrap input { display: none; }
    .tog-pill {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.10);
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .tog-pill::before {
      content: '';
      position: absolute;
      width: 13px; height: 13px;
      left: 2px; top: 2px;
      background: rgba(255,255,255,0.35);
      border-radius: 50%;
      transition: transform 0.18s, background 0.18s;
    }
    .tog-wrap input:checked + .tog-pill {
      background: rgba(255,255,255,0.22);
    }
    .tog-wrap input:checked + .tog-pill::before {
      transform: translateX(13px);
      background: #fff;
    }

    /* solo button */
    .btn-solo {
      padding: 2px 7px;
      font-size: 0.58rem;
      letter-spacing: 0.10em;
      border-radius: 4px;
      opacity: 0.4;
      transition: opacity 0.15s, background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .btn-solo:hover { opacity: 0.75; }
    .btn-solo.active {
      opacity: 1;
      background: rgba(255, 220, 80, 0.18);
      border-color: rgba(255, 220, 80, 0.55);
      color: #ffd84a;
    }

    .tune-divider {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 2px 0;
    }

    /* mode dropdown */
    .band-select {
      margin-left: auto;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.45);
      font-size: 0.57rem;
      letter-spacing: 0.04em;
      padding: 2px 5px;
      border-radius: 4px;
      cursor: pointer;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      transition: border-color 0.15s, color 0.15s;
    }
    .band-select:hover {
      border-color: rgba(255,255,255,0.22);
      color: rgba(255,255,255,0.7);
    }
    .band-select option { background: #0a0a10; }

    .tune-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .tune-label {
      font-size: 0.63rem;
      letter-spacing: 0.09em;
      opacity: 0.45;
      text-transform: uppercase;
      width: 58px;
      flex-shrink: 0;
    }

    .tune-row input[type=range] {
      flex: 1;
      accent-color: rgba(255,255,255,0.6);
      height: 2px;
      cursor: pointer;
    }

    .tune-val {
      font-size: 0.63rem;
      opacity: 0.4;
      width: 28px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    #btn-tune {
      position: fixed;
      bottom: 20px;
      right: 24px;
      padding: 6px 12px;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      opacity: 0.25;
      pointer-events: all;
      transition: opacity 0.2s;
    }
    #btn-tune:hover { opacity: 0.7; }
    #btn-tune.active { opacity: 0.7; border-color: rgba(255,255,255,0.35); }

    /* ── Debug / Color buttons (top-left) ───────────────────────── */
    #top-left {
      position: fixed;
      top: 20px;
      left: 20px;
      display: flex;
      gap: 8px;
      pointer-events: all;
    }
    #top-left button {
      padding: 5px 11px;
      font-size: 0.62rem;
      letter-spacing: 0.10em;
      opacity: 0.22;
      transition: opacity 0.2s;
    }
    #top-left button:hover  { opacity: 0.65; }
    #top-left button.active { opacity: 0.85; border-color: rgba(255,255,255,0.35); }

    /* ── Debug overlay ───────────────────────────────────────────── */
    #debug {
      position: fixed;
      top: 52px;
      left: 20px;
      background: rgba(0,0,0,0.72);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 8px;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      pointer-events: none;
      min-width: 180px;
    }
    #debug.hidden { display: none; }
    .db-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .db-label {
      font-size: 0.58rem;
      letter-spacing: 0.07em;
      opacity: 0.38;
      width: 38px;
      flex-shrink: 0;
      font-family: 'SF Mono', 'Menlo', monospace;
    }
    .db-track {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
      overflow: hidden;
    }
    .db-bar {
      height: 100%;
      width: 0%;
      border-radius: 2px;
      transition: width 0.04s linear;
    }
    .db-val {
      font-size: 0.58rem;
      width: 30px;
      text-align: right;
      opacity: 0.40;
      font-variant-numeric: tabular-nums;
      font-family: 'SF Mono', 'Menlo', monospace;
    }

    /* ── Training panel ─────────────────────────────────────────── */
    #train {
      position: fixed;
      top: 52px;
      left: 214px;
      background: rgba(8,8,14,0.88);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 11px;
      backdrop-filter: blur(14px);
      pointer-events: all;
      min-width: 190px;
      transition: opacity 0.3s, transform 0.3s;
    }
    #train.hidden { opacity: 0; pointer-events: none; transform: translateY(4px); }

    .train-title {
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      opacity: 0.35;
      text-transform: uppercase;
    }

    .train-bands {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 5px;
    }

    .train-band-btn {
      padding: 5px 4px;
      font-size: 0.58rem;
      letter-spacing: 0.10em;
      border-radius: 5px;
      opacity: 0.40;
      transition: opacity 0.15s, background 0.15s, border-color 0.15s;
      position: relative;
    }
    .train-band-btn:hover { opacity: 0.75; }
    .train-band-btn.active {
      opacity: 1;
      background: rgba(120, 200, 255, 0.14);
      border-color: rgba(120, 200, 255, 0.45);
      color: #88d8ff;
    }
    /* dot indicator when template is saved */
    .train-band-btn.has-tmpl::after {
      content: '';
      position: absolute;
      top: 3px; right: 4px;
      width: 5px; height: 5px;
      background: #7dffb3;
      border-radius: 50%;
    }
    .train-band-btn.active.has-tmpl::after { background: #88d8ff; }

    .train-status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    #train-status {
      font-size: 0.60rem;
      opacity: 0.45;
      letter-spacing: 0.03em;
      flex: 1;
    }
    #train-count {
      font-size: 0.62rem;
      font-variant-numeric: tabular-nums;
      font-family: 'SF Mono', 'Menlo', monospace;
      opacity: 0.55;
      color: #88d8ff;
      white-space: nowrap;
    }

    #train-tap {
      padding: 14px 0;
      font-size: 0.90rem;
      letter-spacing: 0.18em;
      border-radius: 8px;
      transition: background 0.12s, border-color 0.12s, transform 0.06s, opacity 0.15s;
    }
    #train-tap:not(:disabled):hover {
      background: rgba(120, 200, 255, 0.14);
      border-color: rgba(120, 200, 255, 0.40);
    }
    #train-tap:not(:disabled):active,
    #train-tap.flash {
      background: rgba(120, 200, 255, 0.30);
      border-color: rgba(120, 200, 255, 0.70);
      transform: scale(0.97);
    }

    .train-actions {
      display: flex;
      gap: 7px;
    }
    .train-actions button {
      flex: 1;
      padding: 6px 4px;
      font-size: 0.62rem;
      letter-spacing: 0.10em;
      border-radius: 5px;
      opacity: 0.5;
      transition: opacity 0.15s, background 0.15s;
    }
    .train-actions button:not(:disabled):hover { opacity: 0.85; }
    #train-save:not(:disabled) {
      border-color: rgba(125, 255, 179, 0.40);
      color: #7dffb3;
    }
    #train-clear:not(:disabled) {
      border-color: rgba(255, 100, 100, 0.35);
      color: #ff9090;
    }

    .train-hint {
      font-size: 0.56rem;
      opacity: 0.22;
      letter-spacing: 0.05em;
      text-align: center;
    }

    /* ── Corner label ────────────────────────────────────────────── */
    #preset-label {
      position: fixed;
      top: 20px;
      right: 24px;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      opacity: 0.2;
      pointer-events: none;
    }

    /* ── Error overlay ───────────────────────────────────────────── */
    #error {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ff7d7d;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="ui">
  <h1>Bloom</h1>

  <div class="connect-row">
    <button id="btn-system">System Audio</button>
    <button id="btn-mic">Microphone</button>
    <button id="btn-file">Load File</button>
    <input type="file" id="file-input" accept="audio/*,video/*" style="display:none">
  </div>

  <div class="status-row">
    <span id="status-audio" class="status">Audio: not connected</span>
  </div>
</div>

<div id="preset-label">BLOOM</div>
<div id="error"></div>

<div id="top-left">
  <button id="btn-debug">DEBUG</button>
  <button id="btn-color">COLOR</button>
  <button id="btn-train">TRAIN</button>
</div>

<div id="debug" class="hidden">
  <div class="db-row"><span class="db-label">KICK</span> <div class="db-track"><div class="db-bar" id="db-bar-kick"></div></div> <span class="db-val" id="db-val-kick">0.00</span></div>
  <div class="db-row"><span class="db-label">SNARE</span><div class="db-track"><div class="db-bar" id="db-bar-snare"></div></div><span class="db-val" id="db-val-snare">0.00</span></div>
  <div class="db-row"><span class="db-label">BASS</span> <div class="db-track"><div class="db-bar" id="db-bar-bass"></div></div> <span class="db-val" id="db-val-bass">0.00</span></div>
  <div class="db-row"><span class="db-label">MID</span>  <div class="db-track"><div class="db-bar" id="db-bar-mid"></div></div>  <span class="db-val" id="db-val-mid">0.00</span></div>
  <div class="db-row"><span class="db-label">HIGH</span> <div class="db-track"><div class="db-bar" id="db-bar-high"></div></div> <span class="db-val" id="db-val-high">0.00</span></div>
  <div class="db-row"><span class="db-label">SUB</span>  <div class="db-track"><div class="db-bar" id="db-bar-subBass"></div></div><span class="db-val" id="db-val-subBass">0.00</span></div>
</div>

<button id="btn-tune">TUNE</button>

<div id="tune" class="hidden">
  <div class="band-row" id="band-drums">
    <span class="band-name">Drums</span>
    <label class="tog-wrap"><input type="checkbox" id="tog-drums" checked><span class="tog-pill"></span></label>
    <button class="btn-solo" id="solo-drums">SOLO</button>
    <select class="band-select" id="mode-drums">
      <option value="0">Burst</option>
      <option value="1">Shockwave</option>
      <option value="2">Slam</option>
    </select>
  </div>
  <div class="band-row" id="band-bass">
    <span class="band-name">Bass</span>
    <label class="tog-wrap"><input type="checkbox" id="tog-bass" checked><span class="tog-pill"></span></label>
    <button class="btn-solo" id="solo-bass">SOLO</button>
    <select class="band-select" id="mode-bass">
      <option value="0">Ripple</option>
      <option value="1">Wells</option>
      <option value="2">Swell</option>
      <option value="3">Ring</option>
    </select>
  </div>
  <div class="band-row" id="band-lead">
    <span class="band-name">Lead</span>
    <label class="tog-wrap"><input type="checkbox" id="tog-lead" checked><span class="tog-pill"></span></label>
    <button class="btn-solo" id="solo-lead">SOLO</button>
    <select class="band-select" id="mode-lead">
      <option value="0">Curl</option>
      <option value="1">Vortex</option>
      <option value="2">Pinball</option>
    </select>
  </div>
  <div class="band-row" id="band-atmos">
    <span class="band-name">Atmos</span>
    <label class="tog-wrap"><input type="checkbox" id="tog-atmos" checked><span class="tog-pill"></span></label>
    <button class="btn-solo" id="solo-atmos">SOLO</button>
    <select class="band-select" id="mode-atmos">
      <option value="0">Sparks</option>
      <option value="1">Rain</option>
      <option value="2">Stars</option>
    </select>
  </div>
  <div class="band-row" id="band-pads">
    <span class="band-name">Pads</span>
    <label class="tog-wrap"><input type="checkbox" id="tog-pads" checked><span class="tog-pill"></span></label>
    <button class="btn-solo" id="solo-pads">SOLO</button>
    <select class="band-select" id="mode-pads">
      <option value="0">Rotate</option>
      <option value="1">Breathe</option>
      <option value="2">Fog</option>
    </select>
  </div>

  <div class="tune-divider"></div>

  <div class="tune-row">
    <span class="tune-label">Drums</span>
    <input type="range" id="sl-sb"     min="0" max="3" step="0.05" value="1">
    <span class="tune-val" id="v-sb">1.00</span>
  </div>
  <div class="tune-row">
    <span class="tune-label">Bass</span>
    <input type="range" id="sl-bass"   min="0" max="6" step="0.05" value="3">
    <span class="tune-val" id="v-bass">3.00</span>
  </div>
  <div class="tune-row">
    <span class="tune-label">Lead</span>
    <input type="range" id="sl-mid"    min="0" max="3" step="0.05" value="1">
    <span class="tune-val" id="v-mid">1.00</span>
  </div>
  <div class="tune-row">
    <span class="tune-label">Atmos</span>
    <input type="range" id="sl-high"   min="0" max="3" step="0.05" value="1">
    <span class="tune-val" id="v-high">1.00</span>
  </div>
  <div class="tune-row">
    <span class="tune-label">Spring</span>
    <input type="range" id="sl-spring" min="0" max="0.6" step="0.01" value="0.3">
    <span class="tune-val" id="v-spring">0.30</span>
  </div>
</div>

<div id="train" class="hidden">
  <div class="train-title">TRAIN</div>
  <div class="train-bands">
    <button class="train-band-btn" id="train-band-kick">KICK</button>
    <button class="train-band-btn" id="train-band-snare">SNARE</button>
    <button class="train-band-btn" id="train-band-bass">BASS</button>
    <button class="train-band-btn" id="train-band-lead">LEAD</button>
    <button class="train-band-btn" id="train-band-atmos">ATMOS</button>
    <button class="train-band-btn" id="train-band-pads">PADS</button>
  </div>
  <div class="train-status-row">
    <span id="train-status">Select a band to train</span>
    <span id="train-count"></span>
  </div>
  <button id="train-tap" disabled>TAP</button>
  <div class="train-actions">
    <button id="train-save" disabled>SAVE</button>
    <button id="train-clear" disabled>CLEAR</button>
  </div>
  <div class="train-hint">or press Space to tap</div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
